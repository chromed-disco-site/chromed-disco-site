<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromed Disco</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
  color: #fff;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  position:fixed;
  width:100%;
  z-index:10;
}

.nav img {
  height:40px;
}

.nav-links {
  display:flex;
  gap:30px;
  font-size:12px;
  letter-spacing:2px;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:120px 60px;
  min-height:100vh;
  background: radial-gradient(circle at 70% 20%, rgba(255,255,255,0.08), transparent 40%), #000;
  overflow:hidden;
}

/* LEFT */
.hero-content {
  max-width:500px;
  z-index:2;
}

.tagline {
  letter-spacing:4px;
  font-size:12px;
  color:#aaa;
  margin-bottom:20px;
}

.hero-logo {
  width:420px;
  margin-bottom:20px;
  filter: drop-shadow(0 10px 30px rgba(255,255,255,0.15));
}

.subtext {
  color:#bbb;
  line-height:1.6;
  margin-bottom:30px;
}

.buttons {
  display:flex;
  gap:15px;
}

.btn {
  padding:14px 24px;
  border-radius:25px;
  font-size:12px;
  letter-spacing:2px;
  cursor:pointer;
}

.btn.primary {
  background:#fff;
  color:#000;
}

.btn.secondary {
  border:1px solid #555;
}

/* DISCO IMAGES */
.hero-visual {
  position:relative;
  width:50%;
}

.disco {
  position:absolute;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 40px 80px rgba(0,0,0,0.7);
}

.disco.big {
  width:400px;
  right:60px;
  top:50px;
}

.disco.small {
  width:200px;
  right:0;
  bottom:80px;
}

/* PRODUCTS */
.products {
  padding:80px 60px;
}

.products h2 {
  margin-bottom:30px;
  letter-spacing:4px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:15px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.card h3 {
  margin-top:10px;
}

.price {
  color:#aaa;
}

/* MOBILE */
@media(max-width:900px){
  .hero {
    flex-direction:column;
    text-align:center;
  }

  .hero-visual {
    width:100%;
    margin-top:40px;
  }

  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <img src="logo.png">
  <div class="nav-links">
    <div>SHOP</div>
    <div>DROP 001</div>
    <div>LOOKS</div>
    <div>ABOUT</div>
  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-content">
    <p class="tagline">NIGHT IS OUR CANVAS.</p>

    <img src="logo.png" class="hero-logo">

    <p class="subtext">
      LIMITED DROPS. PREMIUM MATERIALS.<br>
      DESIGNED FOR NIGHTS THAT TURN INTO LEGENDS.
    </p>

    <div class="buttons">
      <div class="btn primary">SHOP DROP 001</div>
      <div class="btn secondary">VIEW THE LOOKBOOK</div>
    </div>
  </div>

  <div class="hero-visual">
    <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819" class="disco big">
    <img src="https://images.unsplash.com/photo-1521334884684-d80222895322" class="disco small">
  </div>

</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>DROP 001</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975922071-a23bfa2cbdcb">
      <h3>Midnight Chrome Tee</h3>
      <div class="price">$48</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542060748-10c28b62716b">
      <h3>After Dark Hoodie</h3>
      <div class="price">$98</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Chrome Logo Cap</h3>
      <div class="price">$38</div>
    </div>
  </div>
</section>

</body>
</html>
