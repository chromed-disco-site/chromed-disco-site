<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chromed Disco</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  background:#000;
  color:#fff;
  font-family: Arial, Helvetica, sans-serif;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.nav img {
  height:40px;
}

.nav-links {
  display:flex;
  gap:30px;
  font-size:14px;
  letter-spacing:2px;
}

.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px 60px;
  min-height:90vh;
}

/* TEXT */
.hero-text {
  max-width:500px;
}

.hero-text h1 {
  font-size:70px;
  line-height:1;
  background:linear-gradient(180deg,#fff,#888);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero-text p {
  margin-top:20px;
  color:#aaa;
}

/* BUTTONS */
.btns {
  margin-top:30px;
}

.btn {
  padding:14px 24px;
  border-radius:20px;
  border:1px solid #fff;
  margin-right:10px;
  cursor:pointer;
}

.btn.primary {
  background:#fff;
  color:#000;
}

/* DISCO BALL */
.disco {
  width:350px;
  height:350px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 40%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 2px, transparent 2px, transparent 6px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 2px, transparent 2px, transparent 6px),
    radial-gradient(circle, #bbb, #222);
  box-shadow:0 0 60px rgba(255,255,255,0.2);
  animation:spin 20s linear infinite;
}

/* SMALL BALL */
.disco-small {
  width:150px;
  height:150px;
  position:absolute;
  right:100px;
  bottom:100px;
  border-radius:50%;
  background:inherit;
  opacity:0.6;
}

/* ANIMATION */
@keyframes spin {
  from {transform:rotate(0deg);}
  to {transform:rotate(360deg);}
}

/* PRODUCTS */
.products {
  padding:80px 60px;
}

.products h2 {
  margin-bottom:30px;
  letter-spacing:4px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:20px;
}

.card img {
  width:100%;
  border-radius:15px;
}

.card h3 {
  margin-top:15px;
}

.price {
  color:#aaa;
}

/* MOBILE */
@media(max-width:900px){
  .hero {
    flex-direction:column;
    text-align:center;
  }

  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <img src="logo.png"/>
  <div class="nav-links">
    <div>SHOP</div>
    <div>DROP 001</div>
    <div>ABOUT</div>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>CHROME<br>DISCO<br>AFTER DARK</h1>
    <p>Limited drops. Premium materials.</p>

    <div class="btns">
      <span class="btn primary">SHOP DROP</span>
      <span class="btn">LOOKBOOK</span>
    </div>
  </div>

  <div style="position:relative;">
    <div class="disco"></div>
    <div class="disco-small"></div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>DROP 001</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975922071-a23bfa2cbdcb"/>
      <h3>Midnight Chrome Tee</h3>
      <div class="price">$48</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542060748-10c28b62716b"/>
      <h3>After Dark Hoodie</h3>
      <div class="price">$98</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"/>
      <h3>Chrome Logo Cap</h3>
      <div class="price">$38</div>
    </div>

  </div>
</section>

</body>
</html>
